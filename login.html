<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login LO — FaithToGrow EventCheck-in</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230d9488'/><text x='50' y='68' font-size='48' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial'>FG</text></svg>" />
  <style>
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(120deg, #134e4a 0%, var(--teal-dark) 55%, var(--blue) 140%);
      padding: 20px;
    }
    .login-card {
      background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.25);
      padding: 38px 36px; width: 100%; max-width: 420px; text-align: center;
    }
    .login-card h1 { font-size: 22px; letter-spacing: -.3px; margin-top: 14px; }
    .login-card p { color: var(--muted); font-size: 13.5px; margin-top: 8px; line-height: 1.6; }
    .login-form { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; text-align: left; }
    .login-form label { font-size: 12px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); }
    .login-form input {
      border: 1.5px solid var(--border); border-radius: 11px; padding: 13px 15px;
      font-size: 15px; font-weight: 600; outline: none; width: 100%;
    }
    .login-form input:focus { border-color: var(--teal); }
    .err { display: none; color: var(--red); font-weight: 700; font-size: 13.5px; margin-top: 4px; }
    .err.show { display: block; }
    .siswa-link { margin-top: 20px; font-size: 13px; }
    .siswa-link a { color: var(--teal-dark); font-weight: 700; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="brand-logo" style="margin:0 auto;width:52px;height:52px;font-size:18px">FG</div>
  <h1>Login LO / Panitia</h1>
  <p>Monitor Panel, Meja Registrasi &amp; QR Peserta hanya untuk LO.<br/>Masuk dengan akun LO yang dibagikan panitia.</p>

  <form class="login-form" onsubmit="doLogin(event)">
    <div>
      <label>Email LO</label>
      <input type="email" id="loEmail" required placeholder="lo@faithtogrow.org" autocomplete="username" />
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="loPass" required placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="err" id="errMsg">Email atau password salah.</div>
    <button type="submit" class="btn btn-primary" style="justify-content:center;padding:14px;font-size:15px">Masuk →</button>
  </form>

  <div class="siswa-link">Peserta / siswa? <a href="hadir.html">Self check-in di sini</a></div>
</div>

<script src="auth.js"></script>
<script>
  // sudah login -> langsung masuk
  const next = new URLSearchParams(location.search).get("next") || "index.html";
  const safeNext = ["index.html", "checkin.html", "tickets.html"].includes(next) ? next : "index.html";
  if (ftgIsAuthed()) location.replace(safeNext);

  function doLogin(e) {
    e.preventDefault();
    if (ftgLogin(document.getElementById("loEmail").value, document.getElementById("loPass").value)) {
      location.replace(safeNext);
    } else {
      document.getElementById("errMsg").classList.add("show");
      document.getElementById("loPass").value = "";
      document.getElementById("loPass").focus();
    }
  }
</script>
</body>
</html>
